<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINTERM · NUTRITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a08;--panel:#0d100d;--panel2:#111411;
  --rule:rgba(120,180,120,0.13);--rule2:rgba(120,180,120,0.06);
  --txt:#cfeacf;--dim:rgba(207,234,207,0.55);--dim2:rgba(207,234,207,0.28);
  --green:#7ee787;--amber:#f0b86e;--red:#ff7b72;--blue:#79c0ff;
  --font:'JetBrains Mono',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--rule);background:var(--panel)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-title{color:var(--green);font-weight:700;font-size:14px;letter-spacing:0.05em}
.hdr-sub{color:var(--dim);font-size:11px}
.section-pills{display:flex;gap:6px;align-items:center}
.section-pill{padding:3px 10px;border:1px solid rgba(120,180,120,0.2);color:rgba(207,234,207,0.4);font-size:11px;font-weight:600;letter-spacing:0.08em;text-decoration:none;transition:color 0.15s,border-color 0.15s}
.section-pill.active{border-color:var(--green);color:var(--green)}
.section-pill:hover:not(.active){color:var(--txt);border-color:rgba(120,180,120,0.5)}
.nav{display:flex;align-items:center;border-bottom:1px solid var(--rule);background:var(--panel);overflow-x:auto}
.nav-item{padding:8px 14px;color:var(--dim);font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.15s;text-decoration:none}
.nav-item:hover{color:var(--txt)}
.nav-item.active{color:var(--green);border-bottom-color:var(--green)}
.nav-key{color:rgba(207,234,207,0.28)}
.page{padding:12px 16px;display:flex;flex-direction:column;gap:12px;max-width:1200px;margin:0 auto}
.box{background:var(--panel);border:1px solid var(--rule);padding:14px}
.sec-label{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.chart-wrap{position:relative;height:180px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.micro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.micro-item{background:var(--panel2);border:1px solid var(--rule2);padding:10px}
.micro-label{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.micro-bar{height:5px;background:rgba(120,180,120,0.1);border-radius:2px;overflow:hidden;margin:4px 0}
.micro-fill{height:100%;border-radius:2px;transition:width 0.4s}
.micro-val{font-size:11px;color:var(--dim)}
.no-data{font-size:11px;color:var(--dim2);padding:30px 0;text-align:center}
.dr-pills{display:flex;gap:4px;margin-left:auto}.dr-pill{padding:2px 9px;border:1px solid rgba(120,180,120,0.2);color:rgba(207,234,207,0.35);font-size:10px;font-weight:600;letter-spacing:0.07em;cursor:pointer;background:none;font-family:var(--font);transition:color 0.15s,border-color 0.15s}.dr-pill.active{border-color:var(--green);color:var(--green)}.dr-pill:hover:not(.active){color:var(--txt);border-color:rgba(120,180,120,0.4)}@media(max-width:768px){.two-col{grid-template-columns:1fr}.micro-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-dot"></div>
    <span class="hdr-title">FINTERM/ANGUS</span>
    <span class="hdr-sub">health</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="section-pills">
      <a class="section-pill" href="/dashboard">FINANCE</a>
      <a class="section-pill" href="/care/anti-age">CARE</a>
      <a class="section-pill active" href="/health/dashboard">HEALTH</a>
    </div>
  </div>
</header>

<nav class="nav">
  <a class="nav-item" href="/health/dashboard"><span class="nav-key">[D]</span>ASHBOARD</a>
  <a class="nav-item" href="/health/recovery"><span class="nav-key">[R]</span>ECOVERY</a>
  <a class="nav-item" href="/health/sleep"><span class="nav-key">[S]</span>LEEP</a>
  <a class="nav-item" href="/health/strain"><span class="nav-key">[S]</span>TRAIN</a>
  <a class="nav-item" href="/health/cardio"><span class="nav-key">[C]</span>ARDIO</a>
  <a class="nav-item active" href="/health/nutrition"><span class="nav-key">[N]</span>UTRITION</a>
  <a class="nav-item" href="/health/strength"><span class="nav-key">[S]</span>TRENGTH</a>
  <a class="nav-item" href="/health/import"><span class="nav-key">[I]</span>MPORT</a>
</nav>

<div style="background:var(--panel);border-bottom:1px solid var(--rule);padding:6px 16px;display:flex;align-items:center;gap:8px">
  <span style="font-size:10px;color:var(--dim2)">RANGE</span>
  <div class="dr-pills">
    <button class="dr-pill active" onclick="setDays(14)">2W</button>
    <button class="dr-pill" onclick="setDays(30)">1M</button>
    <button class="dr-pill" onclick="setDays(90)">3M</button>
    <button class="dr-pill" onclick="setDays(180)">6M</button>
    <button class="dr-pill" onclick="setDays(365)">1Y</button>
    <button class="dr-pill" onclick="setDays(1825)">ALL</button>
  </div>
</div>

<main class="page">

<div class="two-col">
  <div class="box">
    <div class="sec-label" id="lbl-cal">Calories · 2 weeks</div>
    <div class="chart-wrap"><canvas id="cal-chart"></canvas></div>
  </div>
  <div class="box">
    <div class="sec-label" id="lbl-prot">Protein · 2 weeks (target 160g)</div>
    <div class="chart-wrap"><canvas id="prot-chart"></canvas></div>
  </div>
</div>

<div class="two-col">
  <div class="box">
    <div class="sec-label">Macro ratio · 7-day avg</div>
    <div class="chart-wrap" style="height:200px"><canvas id="macro-donut"></canvas></div>
  </div>
  <div class="box">
    <div class="sec-label">Micronutrients · 7-day avg vs RDI</div>
    <div id="micro-panel"></div>
  </div>
</div>

<div class="two-col">
  <div class="box">
    <div class="sec-label">Caffeine · 30 days (mg)</div>
    <div class="chart-wrap" style="height:140px"><canvas id="caff-chart"></canvas></div>
  </div>
  <div class="box">
    <div class="sec-label">Sodium · 30 days (mg)</div>
    <div class="chart-wrap" style="height:140px"><canvas id="sodium-chart"></canvas></div>
  </div>
</div>

</main>

<script>
const GREEN='#7ee787', AMBER='#f0b86e', RED='#ff7b72', BLUE='#79c0ff';
const GRID='rgba(120,180,120,0.08)', TICK='rgba(207,234,207,0.28)';

let DAYS = 14;
function setDays(d){
  DAYS=d;
  document.querySelectorAll('.dr-pill').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes('('+d+')')));
  const lbl=d<=14?'2 weeks':d<=30?'30 days':d<=90?'3 months':d<=180?'6 months':d<=365?'1 year':'all time';
  const calEl=document.getElementById('lbl-cal'); if(calEl) calEl.textContent=`Calories · ${lbl}`;
  const protEl=document.getElementById('lbl-prot'); if(protEl) protEl.textContent=`Protein · ${lbl} (target 160g)`;
  Chart.helpers.each(Chart.instances,c=>c.destroy());
  load();
}

const TOOLTIP={backgroundColor:'#0d100d',borderColor:'rgba(120,180,120,0.3)',borderWidth:1,
  titleColor:'rgba(207,234,207,0.55)',bodyColor:'#cfeacf',
  titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:11}};
const SCALE={
  x:{grid:{color:GRID},ticks:{color:TICK,font:{family:'JetBrains Mono',size:9},maxTicksLimit:8}},
  y:{grid:{color:GRID},ticks:{color:TICK,font:{family:'JetBrains Mono',size:9}}}
};

// RDI values
const RDI = {fiber_g:28, magnesium_mg:400, potassium_mg:4700, calcium_mg:1000, iron_mg:8, vitamin_d_mcg:20};

function avg(arr, field){const v=arr.map(d=>d[field]).filter(v=>v!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function shortDate(d){return d?d.slice(5):'';}
function noData(id){const el=document.getElementById(id);if(el){const w=el.closest('.chart-wrap');if(w)w.innerHTML='<div class="no-data">No data</div>';}}

function barChart(id, labels, data, color, refLine){
  const ctx=document.getElementById(id);if(!ctx)return;
  const datasets=[{label:'',data,backgroundColor:color,borderWidth:0,borderRadius:2}];
  if(refLine){datasets.push({label:'target',data:labels.map(()=>refLine),borderColor:'rgba(207,234,207,0.25)',borderDash:[4,3],borderWidth:1,type:'line',pointRadius:0,fill:false});}
  new Chart(ctx,{type:'bar',data:{labels,datasets},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:TOOLTIP},scales:SCALE}});
}

function lineChart(id, labels, data, color, refLine){
  const ctx=document.getElementById(id);if(!ctx)return;
  const datasets=[{label:'',data,borderColor:color,borderWidth:2,pointRadius:2,pointBackgroundColor:color,tension:0.3,fill:true,backgroundColor:color.replace('rgb','rgba').replace(')',',0.06)')}];
  if(refLine){datasets.push({label:'target',data:labels.map(()=>refLine),borderColor:'rgba(207,234,207,0.25)',borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false});}
  new Chart(ctx,{type:'line',data:{labels,datasets},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:TOOLTIP},scales:SCALE}});
}

async function load(){
  const res=await fetch(`/api/health/nutrition/detail?days=${DAYS}`);
  const data=await res.json();

  if(!data||!data.length){
    document.querySelector('.page').innerHTML='<div class="no-data" style="padding:40px">No nutrition data. Import MacroFactor CSV from <a href="/health/import">IMPORT</a>.</div>';
    return;
  }

  const labels=data.map(d=>shortDate(d.date));

  // Calories
  const calData=data.map(d=>d.calories||0);
  const calAvg=Math.round(calData.reduce((a,b)=>a+b,0)/calData.length);
  barChart('cal-chart',labels,calData,'rgba(126,231,135,0.6)',calAvg);

  // Protein
  const protData=data.map(d=>d.protein_g||0);
  const protColors=protData.map(v=>v>=160?'rgba(126,231,135,0.7)':'rgba(240,184,110,0.7)');
  const ctx=document.getElementById('prot-chart');
  if(ctx){
    new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {data:protData,backgroundColor:protColors,borderWidth:0,borderRadius:2},
      {label:'target',data:labels.map(()=>160),borderColor:'rgba(126,231,135,0.3)',borderDash:[4,3],borderWidth:1,type:'line',pointRadius:0,fill:false}
    ]},options:{animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:TOOLTIP},scales:SCALE}});
  }

  // Macro ratio donut (7-day avg)
  const last7=data.slice(-7);
  const avgProt=avg(last7,'protein_g')*4;
  const avgCarbs=avg(last7,'carbs_g')*4;
  const avgFat=avg(last7,'fat_g')*9;
  const macroTotal=avgProt+avgCarbs+avgFat||1;
  const macroDonut=document.getElementById('macro-donut');
  if(macroDonut){
    new Chart(macroDonut,{type:'doughnut',
      data:{labels:['Protein','Carbs','Fat'],datasets:[{
        data:[avgProt/macroTotal*100,avgCarbs/macroTotal*100,avgFat/macroTotal*100].map(v=>+v.toFixed(1)),
        backgroundColor:[GREEN,'rgba(121,192,255,0.8)',AMBER],borderWidth:0,hoverOffset:4}]},
      options:{animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'right',labels:{color:TICK,font:{family:'JetBrains Mono',size:10},boxWidth:10,padding:8,generateLabels:chart=>{
          const ds=chart.data.datasets[0];
          return chart.data.labels.map((l,i)=>({text:`${l} ${ds.data[i]}%`,fillStyle:ds.backgroundColor[i],strokeStyle:'transparent',index:i}));
        }}},tooltip:TOOLTIP}}});
  }

  // Micronutrients panel
  const microFields=[
    {key:'fiber_g',label:'Fiber',rdi:RDI.fiber_g,unit:'g'},
    {key:'magnesium_mg',label:'Magnesium',rdi:RDI.magnesium_mg,unit:'mg'},
    {key:'potassium_mg',label:'Potassium',rdi:RDI.potassium_mg,unit:'mg'},
    {key:'calcium_mg',label:'Calcium',rdi:RDI.calcium_mg,unit:'mg'},
    {key:'vitamin_d_mcg',label:'Vitamin D',rdi:RDI.vitamin_d_mcg,unit:'μg'},
  ];
  const microHTML = microFields.map(f=>{
    const val=avg(last7,f.key);
    const pct=Math.min(val/f.rdi*100,100);
    const col=pct>=80?GREEN:pct>=50?AMBER:RED;
    return `<div class="micro-item">
      <div class="micro-label">${f.label}</div>
      <div class="micro-bar"><div class="micro-fill" style="width:${pct.toFixed(0)}%;background:${col}"></div></div>
      <div class="micro-val">${val.toFixed(f.unit==='μg'?1:0)}${f.unit} <span style="color:var(--dim2)">/ ${f.rdi}${f.unit} (${pct.toFixed(0)}%)</span></div>
    </div>`;
  }).join('');
  document.getElementById('micro-panel').innerHTML = `<div class="micro-grid">${microHTML}</div>`;

  // Caffeine
  const caffData=data.map(d=>d.caffeine_mg||0);
  if(caffData.some(v=>v>0)){
    barChart('caff-chart',labels,caffData,'rgba(240,184,110,0.6)');
  } else { noData('caff-chart'); }

  // Sodium
  const sodData=data.map(d=>d.sodium_mg||0);
  if(sodData.some(v=>v>0)){
    const sodColors=sodData.map(v=>v>2300?'rgba(255,123,114,0.7)':'rgba(121,192,255,0.6)');
    const ctxS=document.getElementById('sodium-chart');
    if(ctxS){
      new Chart(ctxS,{type:'bar',data:{labels,datasets:[
        {data:sodData,backgroundColor:sodColors,borderWidth:0,borderRadius:2},
        {label:'2300mg limit',data:labels.map(()=>2300),borderColor:'rgba(255,123,114,0.3)',borderDash:[4,3],borderWidth:1,type:'line',pointRadius:0,fill:false}
      ]},options:{animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:TOOLTIP},scales:SCALE}});
    }
  } else { noData('sodium-chart'); }
}

load().catch(e=>console.error(e));
</script>
</body>
</html>
