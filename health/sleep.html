<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINTERM · SLEEP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a08;--panel:#0d100d;--panel2:#111411;
  --rule:rgba(120,180,120,0.13);--rule2:rgba(120,180,120,0.06);
  --txt:#cfeacf;--dim:rgba(207,234,207,0.55);--dim2:rgba(207,234,207,0.28);
  --green:#7ee787;--amber:#f0b86e;--red:#ff7b72;--blue:#79c0ff;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--rule);background:var(--panel)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-title{color:var(--green);font-weight:700;font-size:14px;letter-spacing:0.05em}
.hdr-sub{color:var(--dim);font-size:11px}
.section-pills{display:flex;gap:6px;align-items:center}
.section-pill{padding:3px 10px;border:1px solid rgba(120,180,120,0.2);color:rgba(207,234,207,0.4);font-size:11px;font-weight:600;letter-spacing:0.08em;text-decoration:none;transition:color 0.15s,border-color 0.15s}
.section-pill.active{border-color:var(--green);color:var(--green)}
.section-pill:hover:not(.active){color:var(--txt);border-color:rgba(120,180,120,0.5)}
.nav{display:flex;align-items:center;border-bottom:1px solid var(--rule);background:var(--panel);overflow-x:auto}
.nav-item{padding:8px 14px;color:var(--dim);font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.15s;text-decoration:none}
.nav-item:hover{color:var(--txt)}
.nav-item.active{color:var(--green);border-bottom-color:var(--green)}
.nav-key{color:rgba(207,234,207,0.28)}
.page{padding:12px 16px;display:flex;flex-direction:column;gap:12px;max-width:1200px;margin:0 auto}
.box{background:var(--panel);border:1px solid var(--rule);padding:14px}
.sec-label{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.chart-wrap{position:relative;height:200px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-card{background:var(--panel2);border:1px solid var(--rule2);padding:10px 12px}
.stat-card-label{font-size:10px;color:var(--dim2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.stat-card-val{font-size:18px;font-weight:700;color:var(--green)}
.stat-card-sub{font-size:10px;color:var(--dim2);margin-top:2px}
.no-data{font-size:11px;color:var(--dim2);padding:30px 0;text-align:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-dot"></div>
    <span class="hdr-title">FINTERM/ANGUS</span>
    <span class="hdr-sub">health</span>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="section-pills">
      <a class="section-pill" href="/dashboard">FINANCE</a>
      <a class="section-pill" href="/care/anti-age">CARE</a>
      <a class="section-pill active" href="/health/dashboard">HEALTH</a>
    </div>
  </div>
</header>

<nav class="nav">
  <a class="nav-item" href="/health/dashboard"><span class="nav-key">[D]</span>ASHBOARD</a>
  <a class="nav-item" href="/health/recovery"><span class="nav-key">[R]</span>ECOVERY</a>
  <a class="nav-item active" href="/health/sleep"><span class="nav-key">[S]</span>LEEP</a>
  <a class="nav-item" href="/health/strain"><span class="nav-key">[S]</span>TRAIN</a>
  <a class="nav-item" href="/health/cardio"><span class="nav-key">[C]</span>ARDIO</a>
  <a class="nav-item" href="/health/nutrition"><span class="nav-key">[N]</span>UTRITION</a>
  <a class="nav-item" href="/health/strength"><span class="nav-key">[S]</span>TRENGTH</a>
  <a class="nav-item" href="/health/import"><span class="nav-key">[I]</span>MPORT</a>
</nav>

<main class="page">

<div id="stats-row" class="stats-row">
  <div class="stat-card"><div class="stat-card-label">Avg total</div><div class="stat-card-val" id="avg-total">—</div></div>
  <div class="stat-card"><div class="stat-card-label">Avg REM</div><div class="stat-card-val" id="avg-rem" style="color:#79c0ff">—</div></div>
  <div class="stat-card"><div class="stat-card-label">Avg Deep</div><div class="stat-card-val" id="avg-deep" style="color:#f0b86e">—</div></div>
  <div class="stat-card"><div class="stat-card-label">Avg efficiency</div><div class="stat-card-val" id="avg-eff">—</div><div class="stat-card-sub">sleep / (sleep + awake)</div></div>
</div>

<div class="box">
  <div class="sec-label">30 nights · sleep stages</div>
  <div class="chart-wrap" style="height:220px"><canvas id="stages-chart"></canvas></div>
</div>

<div class="two-col">
  <div class="box">
    <div class="sec-label">Sleep score · 30-day</div>
    <div class="chart-wrap" style="height:160px"><canvas id="score-chart"></canvas></div>
  </div>
  <div class="box">
    <div class="sec-label">Bedtime consistency</div>
    <div class="chart-wrap" style="height:160px"><canvas id="bedtime-chart"></canvas></div>
  </div>
</div>

</main>

<script>
const GREEN='#7ee787', AMBER='#f0b86e', RED='#ff7b72', BLUE='#79c0ff';
const GRID='rgba(120,180,120,0.08)', TICK='rgba(207,234,207,0.28)';

const TOOLTIP = {
  backgroundColor:'#0d100d', borderColor:'rgba(120,180,120,0.3)', borderWidth:1,
  titleColor:'rgba(207,234,207,0.55)', bodyColor:'#cfeacf',
  titleFont:{family:'JetBrains Mono',size:10}, bodyFont:{family:'JetBrains Mono',size:11}
};
const SCALE_OPTS = {
  x:{grid:{color:GRID},ticks:{color:TICK,font:{family:'JetBrains Mono',size:9},maxTicksLimit:10}},
  y:{grid:{color:GRID},ticks:{color:TICK,font:{family:'JetBrains Mono',size:9}}}
};

function fmtHrs(h){if(!h)return '—';const hr=Math.floor(h),mn=Math.round((h-hr)*60);return `${hr}h${mn>0?mn+'m':''}`}
function avg(arr){const v=arr.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null}
function shortDate(d){return d?d.slice(5):''}

async function load(){
  const res = await fetch('/api/health/sleep?days=30');
  const data = await res.json();

  if(!data || !data.length){
    document.getElementById('stats-row').innerHTML = '<div style="color:var(--dim2);font-size:11px">No sleep data. Import Apple Health or Sleep Cycle data.</div>';
    return;
  }

  // Stats
  const totals = data.map(d=>d.total_sleep_hrs).filter(v=>v);
  const rems = data.map(d=>d.rem_hrs).filter(v=>v);
  const deeps = data.map(d=>d.deep_hrs).filter(v=>v);
  const effs = data.map(d=>{
    const tot = d.total_sleep_hrs || 0;
    const awk = d.awake_hrs || 0;
    return (tot+awk) > 0 ? tot/(tot+awk)*100 : null;
  }).filter(v=>v);

  document.getElementById('avg-total').textContent = fmtHrs(avg(totals));
  document.getElementById('avg-rem').textContent = fmtHrs(avg(rems));
  document.getElementById('avg-deep').textContent = fmtHrs(avg(deeps));
  document.getElementById('avg-eff').textContent = avg(effs) ? Math.round(avg(effs))+'%' : '—';

  const labels = data.map(d=>shortDate(d.night));

  // Stacked bar
  new Chart(document.getElementById('stages-chart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Core',data:data.map(d=>d.core_hrs||0),backgroundColor:'rgba(126,231,135,0.75)',stack:'s'},
        {label:'REM', data:data.map(d=>d.rem_hrs||0), backgroundColor:'rgba(121,192,255,0.75)',stack:'s'},
        {label:'Deep',data:data.map(d=>d.deep_hrs||0),backgroundColor:'rgba(240,184,110,0.75)',stack:'s'},
        {label:'Awake',data:data.map(d=>d.awake_hrs||0),backgroundColor:'rgba(255,123,114,0.5)',stack:'s'},
      ]
    },
    options:{
      animation:false, responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{color:TICK,font:{family:'JetBrains Mono',size:9},boxWidth:10,padding:10}},tooltip:TOOLTIP},
      scales:{
        x:{...SCALE_OPTS.x, stacked:true, ticks:{...SCALE_OPTS.x.ticks, maxTicksLimit:12}},
        y:{...SCALE_OPTS.y, stacked:true, title:{display:true,text:'hours',color:TICK,font:{family:'JetBrains Mono',size:9}}}
      }
    }
  });

  // Sleep score trend
  const histRes = await fetch('/api/health/scores/history?days=30');
  const hist = await histRes.json();
  const slpScores = hist.filter(d=>d.sleep!==null);
  if(slpScores.length){
    new Chart(document.getElementById('score-chart'),{
      type:'line',
      data:{
        labels:slpScores.map(d=>shortDate(d.date)),
        datasets:[
          {label:'Sleep score',data:slpScores.map(d=>d.sleep),borderColor:BLUE,borderWidth:2,
           pointRadius:2,pointBackgroundColor:BLUE,tension:0.3,fill:true,backgroundColor:'rgba(121,192,255,0.06)'},
          {label:'67%',data:slpScores.map(()=>67),borderColor:'rgba(126,231,135,0.2)',borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false},
          {label:'33%',data:slpScores.map(()=>33),borderColor:'rgba(255,123,114,0.2)',borderDash:[4,3],borderWidth:1,pointRadius:0,fill:false},
        ]
      },
      options:{animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:TOOLTIP},scales:SCALE_OPTS}
    });
  } else {
    document.getElementById('score-chart').closest('.chart-wrap').innerHTML = '<div style="font-size:11px;color:var(--dim2);padding:30px 0;text-align:center">Calibrating — need 14+ days of HRV data</div>';
  }

  // Bedtime scatter
  const bedtimes = data.map(d=>{
    if(!d.bedtime) return null;
    try{
      const dt = new Date(d.bedtime);
      let h = dt.getHours() + dt.getMinutes()/60;
      if(h < 6) h += 24; // treat early-AM as continuation
      return h;
    } catch{return null;}
  });
  const validBedtimes = bedtimes.filter(v=>v!==null);
  if(validBedtimes.length){
    new Chart(document.getElementById('bedtime-chart'),{
      type:'scatter',
      data:{
        datasets:[{
          label:'Bedtime',
          data:data.map((d,i)=>bedtimes[i]!==null?{x:i,y:bedtimes[i]}:null).filter(v=>v),
          backgroundColor:'rgba(240,184,110,0.7)',pointRadius:4,pointHoverRadius:6
        }]
      },
      options:{
        animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{label:p=>{
          const h=Math.floor(p.parsed.y%24);const m=Math.round((p.parsed.y%1)*60);
          return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }}}},
        scales:{
          x:{display:false},
          y:{grid:{color:GRID},ticks:{color:TICK,font:{family:'JetBrains Mono',size:9},
            callback:v=>{const h=Math.floor(v%24);return String(h).padStart(2,'0')+':00';}}}
        }
      }
    });
  } else {
    document.getElementById('bedtime-chart').closest('.chart-wrap').innerHTML = '<div style="font-size:11px;color:var(--dim2);padding:30px 0;text-align:center">No bedtime data</div>';
  }
}

load().catch(e=>console.error(e));
</script>
</body>
</html>
